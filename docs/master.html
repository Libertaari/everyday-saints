//==================================================================
// 05.1 ROTATE LOGO
//==================================================================
//
// Changes the displayed logo.
//
// Random switching prevents predictable behavior.
//
//==================================================================


function rotateLogo() {


  const box = document.getElementById("logoBox");



  if (Math.random() < 0.5) {


    currentLogo =

      currentLogo === "A"

        ? "B"

        : "A";


  }



  box.style.opacity = 0;



  setTimeout(() => {


    box.textContent = currentLogo;


    box.style.opacity = 1;


  }, 200);



}







//==================================================================
// 05.2 INITIALIZE LOGO SYSTEM
//==================================================================
//
// Runs after page loads.
//
// Sets initial logo.
// Starts five-minute rotation timer.
//
//==================================================================



document.addEventListener("DOMContentLoaded", () => {


  document

    .getElementById("logoBox")

    .textContent = currentLogo;



  setInterval(

    rotateLogo,

    5 * 60 * 1000

  );


});

//==================================================================
// 06.1 FETCH INDIVIDUAL FEED
//==================================================================
//
// Input:
//
// RSS URL
//
// Output:
//
// Standard Everyday Saints article object.
//
//==================================================================



async function fetchFeed(url) {


  try {


    const res = await fetch(


      "https://api.rss2json.com/v1/api.json?rss_url=" +


      encodeURIComponent(url)


    );



    const data = await res.json();




    if (!data.items) {


      return [];


    }




    const channelName =


      data.feed?.title ||


      "RSS FEED ERROR";





    return data.items.map(item => ({


      title: item.title,


      link: item.link,


      pubDate: item.pubDate,


      source: channelName



    }));




  } catch (e) {



    return [];



  }



}

//##################################################################
// 07. FEED PROCESSING
//##################################################################
//
// STATUS:
// Complete

//==================================================================
// 07.1 LOAD ALL FEEDS
//==================================================================
//
// Retrieves all RSS sources and prepares them for display.
//
//==================================================================


async function loadFeed() {


  const feed = document.getElementById("feed");



  const results = await Promise.all(


    rssFeeds.map(url => fetchFeed(url))


  );




  const allItems = results


    .flat()



    .sort((a, b) =>


      new Date(b.pubDate) - new Date(a.pubDate)


    )



    .slice(0, 20);




  renderFeed(allItems);



}

//==================================================================
// 08.1 RENDER FEED CARDS
//==================================================================


function renderFeed(items) {


  const feed = document.getElementById("feed");





  if (!items.length) {



    feed.innerHTML = `


      <div class="feed-item">


        <div class="source">

          RSS FEED ERROR

        </div>



        <div class="title">

          Unable to load feed items.

        </div>



      </div>


    `;



    return;



  }






  feed.innerHTML = items.map(item => `



    <div class="feed-item">


      <div class="source">

        ${item.source}

      </div>



      <div class="title">

        ${item.title}

      </div>



      <div class="meta">

        ${item.pubDate}

      </div>



      <a href="${item.link}" target="_blank">

        Open

      </a>



    </div>



  `).join("");



}
